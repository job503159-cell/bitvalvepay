<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitValve Payment</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .form-box {
            background-color: #222;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .buttons {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .button {
            padding: 15px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 48%;  /* Adjust button width for spacing */
        }
        .accept {
            background-color: gray;
            color: white;
        }
        .cancel {
            background-color: black;
            color: white;
        }
        .description {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>bitvalve</h1>
        <div class="buttons">
            <button class="button accept" onclick="navigateTo('noones.html')">accept payment</button>
            <button class="button cancel" onclick="navigateTo('noones.html')">cancel payment</button>
        </div>
        <p class="description">
            This is a paying agency that allows you to access payment worldwide to your wallet. We have worked with noones, local coinswap, and bitvalve platform.
        </p>
    </div>

    <script>
        function navigateTo(page) {
            window.location.href = page;
        }
    </script>
</body>
</html>
